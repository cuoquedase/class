<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2학년 활동지 - 제출</title>
    <style>
        @font-face {
            font-family: '양진체';
            src: url('https://fastly.jsdelivr.net/gh/supernovice-lab/font@0.9/yangjin.woff') format('woff');
        }

        :root {
            --input-height: 32px;
            --border-color: #000;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: '양진체', sans-serif;
            overflow: hidden;
        }

        .main-container { display: flex; height: 100vh; width: 100%; }

        .worksheet-area {
            flex: 1.2;
            border-right: 3px solid var(--border-color);
            background-color: #f0f0f0;
            min-width: 0;
            display: flex;
            justify-content: center;
        }
        .worksheet-area iframe { width: 100%; height: 100%; border: none; display: block; }

        .input-area {
            flex: 0.8;
            padding: 25px;
            overflow-y: auto;
            background-color: #ffffff;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .nav-btn {
            align-self: flex-end;
            padding: 8px 15px;
            background-color: #fffdec;
            border: 2px solid #000;
            border-radius: 8px;
            font-family: '양진체';
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000;
            margin-bottom: 10px;
        }
        .nav-btn:hover { background-color: #f0f0f0; transform: translate(1px, 1px); box-shadow: 2px 2px 0px #000; }

        h1 { text-align: center; font-size: 1.6rem; margin: 0 0 20px 0; }
        
        .input-box {
            background: #ffffff;
            padding: 20px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 6px 6px 0px var(--border-color);
            margin-bottom: 25px;
        }

        .box-title {
            display: block;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid #eee;
        }

        .flex-row { display: flex; flex-wrap: wrap; gap: 12px 15px; align-items: center; }
        .input-item { display: flex; align-items: center; gap: 5px; }

        input {
            height: var(--input-height);
            padding: 0 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: '양진체', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        input[type="number"].narrow { width: 60px; } 
        input[type="text"].medium, input[type="password"].medium { width: 130px; } 
        input:focus { border-color: var(--border-color); background-color: #fffdec; }

        .pw-wrapper { position: relative; display: flex; align-items: center; }
        .btn-toggle {
            position: absolute; right: 3px;
            height: 26px; padding: 0 6px;
            background: #eee; border: 1px solid #ccc;
            border-radius: 4px; cursor: pointer; font-family: '양진체'; font-size: 0.7rem;
        }

        textarea {
            width: 100%;
            height: 240px; 
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: '양진체', sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            display: block;
        }

        .submit-btn {
            width: 100%; height: 50px;
            background-color: var(--border-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: '양진체';
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
        }
        .submit-btn:hover { background-color: #333; transform: translateY(-2px); }

        @media (max-width: 850px) {
            .main-container { flex-direction: column; overflow-y: auto; }
            .worksheet-area { flex: none; height: 35vh; border-bottom: 3px solid #000; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="worksheet-area">
        <iframe src="https://docs.google.com/document/d/e/2PACX-1vS0fvhPPwZcCbgQAXvjjTEv7R6ds_h5-HLgN9y0tS7w5RGDtWe8ZzWaBtSTCMBJBKU2-42iVqq9nlo7/pub?embedded=true"></iframe>
    </div>
    <div class="input-area">
        <button class="nav-btn" onclick="location.href='search2.html'">🔍 나의 기록 조회하기</button>
        <h1>✏️ 2학년 활동지 제출</h1>
        <form action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSfWWcpr7MJyAn6mWaoL2LUGqR-hLFgqxjONQzWAxkxHCuDmiw/formResponse" target="result" method="post" onsubmit="return numberCheck()">
            <div class="input-box">
                <span class="box-title">👤 본인 확인</span>
                <div class="flex-row">
                    <div class="input-item"><input type="number" name="entry.575609189" class="narrow" placeholder="반" required><span class="unit">반</span></div>
                    <div class="input-item"><input type="number" name="entry.1986804342" class="narrow" placeholder="번" required><span class="unit">번</span></div>
                    <input type="text" name="entry.1440774959" class="medium" placeholder="이름(한글)" id="nameInput" required pattern="^[가-힣]+$" title="공백 없이 한글만 입력 가능합니다.">
                    <div class="pw-wrapper">
                        <input type="password" name="entry.1373887942" class="medium" placeholder="비밀번호" id="password" required pattern="^[a-z0-9]+$" title="소문자와 숫자만 사용 가능합니다.">
                        <button type="button" id="showPassword" class="btn-toggle">보이기</button>
                    </div>
                </div>
            </div>
            <div class="input-box">
                <span class="box-title">📝 활동 내용 작성</span>
                <div class="flex-row">
                    <div class="input-item"><input type="number" name="entry.1913475540" class="narrow" required><span class="unit">차시</span></div>
                    <div class="input-item"><input type="number" name="entry.1403681020" class="narrow" required><span class="unit">번 질문</span></div>
                </div>
                <textarea name="entry.1653996263" placeholder="여기에 답변 내용을 정성껏 입력하세요." required></textarea>
                <input type="submit" value="활동지 제출하기" class="submit-btn">
            </div>
            <iframe name="result" style="display: none;"></iframe>
        </form>
    </div>
</div>
<script>
    // --- 입력 제한 스크립트 추가 ---

    // 이름 입력 제한: 한글만 허용 (공백 제거)
    document.getElementById('nameInput').addEventListener('input', function() {
        this.value = this.value.replace(/[^가-힣]/g, '');
    });

    // 비밀번호 입력 제한: 소문자와 숫자만 허용 (대문자, 공백, 특수문자 제거)
    document.getElementById('password').addEventListener('input', function() {
        this.value = this.value.replace(/[^a-z0-9]/g, '');
    });

    // ----------------------------

    function numberCheck() {
        var form = document.querySelector('form');
        var inputs = form.querySelectorAll('input[required], textarea[required]');
        var valid = true;
        
        inputs.forEach(function(input) { if (!input.checkValidity()) valid = false; });
        
        if (!valid) { 
            alert("입력 형식이 맞지 않거나 누락된 필드가 있습니다.\n이름은 한글만, 비밀번호는 소문자와 숫자만 가능합니다."); 
            return false; 
        }

        if (confirm("제출하시겠습니까?")) {
            alert("확인을 눌러야 제출이 됩니다.");
            setTimeout(function() {
                document.querySelector('textarea[name="entry.1653996263"]').value = '';
                document.querySelector('input[name="entry.1403681020"]').value = '';
            }, 1000); 
            return true;
        }
        return false;
    }

    document.getElementById('showPassword').addEventListener('click', function() {
        var pw = document.getElementById('password');
        pw.type = (pw.type === 'password') ? 'text' : 'password';
        this.textContent = (pw.type === 'password') ? '보이기' : '숨기기';
    });
</script>
</body>
</html>
