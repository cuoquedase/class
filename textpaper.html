<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2학년 활동지 - 제출</title>
    <style>
        @font-face {
            font-family: '양진체';
            src: url('https://fastly.jsdelivr.net/gh/supernovice-lab/font@0.9/yangjin.woff') format('woff');
        }

        :root {
            --input-height: 32px;
            --border-color: #000;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: '양진체', sans-serif;
            overflow: hidden;
        }

        /* 메인 레이아웃: 화면 전체 좌우 분할 */
        .main-container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* 왼쪽 학습지 영역 (흰색 배경 + 중앙 정렬) */
        .worksheet-area {
    flex: 1.1;
    border-right: 3px solid var(--border-color);
    background-color: #f0f0f0; /* 문서 배경과 맞춘 색상 */
    display: flex;
    justify-content: center; /* iframe 내 문서 중앙 정렬 보조 */
    align-items: flex-start; /* 상단부터 정렬 */
}

.worksheet-area iframe {
    width: 100%;
    height: 100%;
    border: none;
    /* 문서 내용이 너무 작게 느껴진다면 아래 zoom 속성을 활용해볼 수 있습니다 */
    /* zoom: 0.9; */
}

        /* 오른쪽 입력 영역 */
        .input-area {
            flex: 0.8;
            padding: 25px;
            overflow-y: auto;
            overflow-x: hidden;
            background-color: #ffffff;
            min-width: 0;
        }

        h1 { text-align: center; font-size: 1.6rem; margin: 0 0 20px 0; }

        /* 그림자 박스 스타일 (search.html과 동일) */
        .input-box {
            background: #ffffff;
            padding: 20px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 6px 6px 0px var(--border-color);
            margin-bottom: 25px;
        }

        .box-title {
            display: block;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid #eee;
        }

        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 15px;
            align-items: center;
        }

        .input-item { display: flex; align-items: center; gap: 5px; }

        /* 너비 최적화 */
        input[type="number"].narrow { width: 60px; } 
        input[type="text"].medium, input[type="password"].medium { width: 130px; } 

        input {
            height: var(--input-height);
            padding: 0 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: '양진체', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        input:focus { border-color: var(--border-color); background-color: #fffdec; }

        .unit { font-size: 0.9rem; white-space: nowrap; }

        /* 비밀번호 토글 */
        .pw-wrapper { position: relative; display: flex; align-items: center; }
        .btn-toggle {
            position: absolute; right: 3px;
            height: 26px; padding: 0 6px;
            background: #eee; border: 1px solid #ccc;
            border-radius: 4px; cursor: pointer; font-family: '양진체'; font-size: 0.75rem;
        }

        /* 서술창 (textarea) */
        textarea {
            width: 100%;
            height: 230px; 
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: '양진체', sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            display: block;
        }

        .submit-btn {
            width: 100%; height: 50px;
            background-color: var(--border-color); color: #fff;
            border: none; border-radius: 6px; cursor: pointer;
            font-family: '양진체'; font-size: 1.2rem; font-weight: bold;
            margin-top: 15px;
            transition: 0.2s;
        }
        .submit-btn:hover { background-color: #333; transform: translateY(-2px); }

        @media (max-width: 850px) {
            .main-container { flex-direction: column; overflow-y: auto; }
            .worksheet-area { flex: none; height: 35vh; border-bottom: 2px solid var(--border-color); }
            .input-area { flex: none; height: auto; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="worksheet-area">
        <iframe src="https://docs.google.com/document/d/e/2PACX-1vS0fvhPPwZcCbgQAXvjjTEv7R6ds_h5-HLgN9y0tS7w5RGDtWe8ZzWaBtSTCMBJBKU2-42iVqq9nlo7/pub?embedded=true"></iframe>
    </div>

    <div class="input-area">
        <h1>✏️ 2학년 활동지 제출</h1>
        
        <form action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSfWWcpr7MJyAn6mWaoL2LUGqR-hLFgqxjONQzWAxkxHCuDmiw/formResponse" 
              target="result" method="post" onsubmit="return numberCheck()">
            
            <div class="input-box">
                <span class="box-title">👤 본인 확인</span>
                <div class="flex-row">
                    <div class="input-item">
                        <input type="number" name="entry.575609189" class="narrow" placeholder="반" min="1" max="10" required>
                        <span class="unit">반</span>
                    </div>
                    <div class="input-item">
                        <input type="number" name="entry.1986804342" class="narrow" placeholder="번" min="1" max="50" required>
                        <span class="unit">번</span>
                    </div>
                    <input type="text" name="entry.1440774959" class="medium" placeholder="이름" id="nameInput" required>
                    <div class="pw-wrapper">
                        <input type="password" name="entry.1373887942" class="medium" placeholder="비밀번호" id="password" required>
                        <button type="button" id="showPassword" class="btn-toggle">보이기</button>
                    </div>
                </div>
            </div>

            <div class="input-box">
                <span class="box-title">📝 활동 내용 작성</span>
                <div class="flex-row">
                    <div class="input-item">
                        <input type="number" name="entry.1913475540" class="narrow" placeholder="차시" min="1" required>
                        <span class="unit">차시</span>
                    </div>
                    <div class="input-item">
                        <input type="number" name="entry.1403681020" class="narrow" placeholder="번호" min="1" required>
                        <span class="unit">번 질문</span>
                    </div>
                    <span style="color: red; font-size: 0.8rem; margin-left: 5px;">
                        <strong>* 질문 번호 확인 필수!</strong>
                    </span>
                </div>
                <textarea name="entry.1653996263" placeholder="여기에 답변 내용을 정성껏 입력하세요." required></textarea>
                <input type="submit" value="활동지 제출하기" class="submit-btn">
            </div>

            <iframe name="result" style="display: none;"></iframe>
        </form>
    </div>
</div>

<script>
    // 선생님의 2학년 전용 스크립트 로직 완벽 유지
    function numberCheck() {
      var form = document.querySelector('form');
      var inputs = form.querySelectorAll('input[required], textarea[required]');
      var valid = true;
      inputs.forEach(function(input) { if (!input.checkValidity()) valid = false; });
      if (!valid) { alert("모든 필드를 정확히 입력해주세요."); return false; }
    
      if (confirm("질문 번호를 확인했습니까?")) {
        alert("제출하였습니다.");
        // 제출 후 2학년 데이터 필드 초기화
        setTimeout(function() {
          document.querySelector('textarea[name="entry.1653996263"]').value = ''; 
          document.querySelector('input[name="entry.1403681020"]').value = '';
        }, 1000); 
        return true;
      }
      return false;
    }
    
    document.getElementById('showPassword').addEventListener('click', function() {
      var pw = document.getElementById('password');
      var isPassword = pw.type === 'password';
      pw.type = isPassword ? 'text' : 'password';
      this.textContent = isPassword ? '숨기기' : '보이기';
    });

    document.getElementById("password").addEventListener("input", function () {
      let inputValue = this.value.toLowerCase().replace(/\s/g, "");
      if (/[^a-z0-9]/.test(inputValue)) {
        alert("소문자 알파벳과 숫자만 사용할 수 있습니다!");
        inputValue = inputValue.replace(/[^a-z0-9]/g, ""); 
      }
      this.value = inputValue;
    });
    
    document.getElementById("nameInput").addEventListener("input", function () {
      this.value = this.value.replace(/\s/g, "");
    });
</script>

</body>
</html>
