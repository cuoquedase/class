<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>나의 활동 기록 조회</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .search-box { background: #f4f4f4; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input { margin: 5px; padding: 8px; }
        button { padding: 8px 20px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; }
        .result-item { border-bottom: 1px solid #ddd; padding: 10px 0; }
        .q-no { font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>
    <h2>📖 나의 국어 수업 활동지 기록 찾기</h2>
    <div class="search-box">
        <input type="text" id="class" placeholder="반 (예: 1)">
        <input type="text" id="num" placeholder="번호 (예: 5)">
        <input type="text" id="name" placeholder="이름">
        <input type="password" id="pw" placeholder="비밀번호">
        <input type="text" id="period" placeholder="차시 (예: 1)">
        <button onclick="searchData()">조회하기</button>
    </div>

    <div id="results">조회 버튼을 눌러주세요.</div>

    <script>
        function searchData() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "데이터를 불러오는 중입니다...";

            const params = new URLSearchParams({
                class: document.getElementById('class').value,
                num: document.getElementById('num').value,
                name: document.getElementById('name').value,
                pw: document.getElementById('pw').value,
                period: document.getElementById('period').value
            });

            // 여기에 1단계에서 복사한 웹 앱 URL을 넣으세요.
            const scriptURL = "https://script.google.com/macros/s/AKfycbxMDqANVFzyPIJZMegl2JJq0LEx45xwiYBYkd3BkGFmpwNU7niWPGT1lSMoi_3nLm6exw/exec";

            fetch(`${scriptURL}?${params.toString()}`)
                .then(response => response.json())
                .then(data => {
                    if (data.length === 0) {
                        resultsDiv.innerHTML = "일치하는 기록이 없습니다. 정보를 확인해 주세요.";
                        return;
                    }
                    let html = "<h3>조회 결과</h3>";
                    data.forEach(item => {
                        html += `<div class="result-item">
                                    <div class="q-no">[${item.questionNo}번 질문 답변]</div>
                                    <div>${item.content}</div>
                                 </div>`;
                    });
                    resultsDiv.innerHTML = html;
                })
                .catch(error => {
                    resultsDiv.innerHTML = "오류가 발생했습니다. 다시 시도해 주세요.";
                    console.error(error);
                });
        }
    </script>
</body>
</html>
